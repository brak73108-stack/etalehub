<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — EtaleHub</title>
  <meta name="description" content="Log in to your EtaleHub account and manage your trade business admin.">
  <meta name="author" content="EtaleHub">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='16'>E</text></svg>">
</head>
<body class="auth-page">
  <div class="auth-card reveal-scale">
    <div class="auth-card__header">
      <a href="index.html" class="auth-card__logo">
        <div class="nav__logo-icon">E</div>
        EtaleHub
      </a>
      <h2 class="auth-card__title">Welcome back</h2>
      <p class="auth-card__subtitle">Log in to manage your AI Office Manager</p>
    </div>

    <form id="login-form" class="auth-form" action="index.html" method="GET">
      <div class="form-group">
        <label for="login-email" class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label for="login-password" class="form-label">Password</label>
          <a href="#" style="font-size: var(--text-xs); color: var(--blue-500); text-decoration: none;">Forgot password?</a>
        </div>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top: var(--space-2);">Log In</button>

      <div class="auth-form__divider">or</div>

      <button type="button" class="btn btn-secondary btn-full" style="border-color: var(--border-default); color: var(--text-primary);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin-right:8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </form>

    <div class="auth-form__footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/main.js"></script>
</body>
</html>
